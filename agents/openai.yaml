interface:
  display_name: GG → Study → Mode
  short_description: Create evidence-backed technical studies in .studies/ with mandatory planning handoff
  icon_small: ./assets/icon-small.svg
  icon_large: ./assets/icon-large.png
  brand_color: '#22C55E'
  default_prompt: >-
    Use when the user needs a rigorous technical study with evidence and decision rationale before
    implementation, or when unresolved architecture questions require structured analysis. Saves
    studies under .studies/ and hands off to planning, decisions, or research skills. Reference
    study/SKILL.md when cross-referencing this skill.
